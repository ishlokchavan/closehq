<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" width="700" height="700">
  <defs>

    <!-- Main radial gradient: very dark at the centre, brightening to light-green tips -->
    <radialGradient id="fg" cx="350" cy="350" r="238" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#071B08"/>
      <stop offset="10%"  stop-color="#1B5E20"/>
      <stop offset="26%"  stop-color="#2E7D32"/>
      <stop offset="44%"  stop-color="#388E3C"/>
      <stop offset="60%"  stop-color="#558B2F"/>
      <stop offset="75%"  stop-color="#7CB342"/>
      <stop offset="89%"  stop-color="#9CCC65"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </radialGradient>

    <!-- Soft ambient glow behind the whole flower -->
    <radialGradient id="glowBg" cx="50%" cy="52%" r="48%">
      <stop offset="0%"   stop-color="#1B5E20" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1B5E20" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop-shadow filters — outer rings cast heavier shadows; inner rings lighter -->
    <filter id="s1" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="2" dy="5" stdDeviation="7" flood-color="#071B08" flood-opacity="0.62"/>
    </filter>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1.5" dy="4" stdDeviation="6" flood-color="#071B08" flood-opacity="0.52"/>
    </filter>
    <filter id="s3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="4.5" flood-color="#071B08" flood-opacity="0.44"/>
    </filter>
    <filter id="s4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#071B08" flood-opacity="0.36"/>
    </filter>
    <filter id="s5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#071B08" flood-opacity="0.28"/>
    </filter>

    <!--
      Petal paths — all in local coordinates.
      Tip points upward (negative Y). Centre of flower = origin (0,0).
      Each petal is placed with translate(350,350) rotate(angle).

      Shape formula: wide belly tapering to a pointed tip and a narrower base,
      driven by two mirrored cubic bezier curves.

      Ring 1  r_base=32  r_tip=220  half_width=46
      Ring 2  r_base=27  r_tip=165  half_width=34
      Ring 3  r_base=23  r_tip=118  half_width=24
      Ring 4  r_base=19  r_tip=80   half_width=15
      Ring 5  r_base=15  r_tip=50   half_width=9
    -->
    <path id="p1" d="M 0,-32 C -46,-76 -34,-182 0,-220 C 34,-182 46,-76 0,-32 Z"/>
    <path id="p2" d="M 0,-27 C -34,-56 -25,-137 0,-165 C 25,-137 34,-56 0,-27 Z"/>
    <path id="p3" d="M 0,-23 C -24,-43 -18,-98  0,-118 C 18,-98  24,-43 0,-23 Z"/>
    <path id="p4" d="M 0,-19 C -15,-30 -11,-65  0,-80  C 11,-65  15,-30 0,-19 Z"/>
    <path id="p5" d="M 0,-15 C -9, -21 -7, -41  0,-50  C 7, -41  9, -21 0,-15 Z"/>
  </defs>

  <!-- Ambient glow disc -->
  <ellipse cx="350" cy="362" rx="235" ry="215" fill="url(#glowBg)"/>

  <!-- ── Ring 1 — 8 large outer petals, 45° apart ─────────────────────── -->
  <g fill="url(#fg)" filter="url(#s1)">
    <use href="#p1" transform="translate(350,350) rotate(0)"/>
    <use href="#p1" transform="translate(350,350) rotate(45)"/>
    <use href="#p1" transform="translate(350,350) rotate(90)"/>
    <use href="#p1" transform="translate(350,350) rotate(135)"/>
    <use href="#p1" transform="translate(350,350) rotate(180)"/>
    <use href="#p1" transform="translate(350,350) rotate(225)"/>
    <use href="#p1" transform="translate(350,350) rotate(270)"/>
    <use href="#p1" transform="translate(350,350) rotate(315)"/>
  </g>

  <!-- ── Ring 2 — 8 medium petals, offset 22.5° ───────────────────────── -->
  <g fill="url(#fg)" filter="url(#s2)">
    <use href="#p2" transform="translate(350,350) rotate(22.5)"/>
    <use href="#p2" transform="translate(350,350) rotate(67.5)"/>
    <use href="#p2" transform="translate(350,350) rotate(112.5)"/>
    <use href="#p2" transform="translate(350,350) rotate(157.5)"/>
    <use href="#p2" transform="translate(350,350) rotate(202.5)"/>
    <use href="#p2" transform="translate(350,350) rotate(247.5)"/>
    <use href="#p2" transform="translate(350,350) rotate(292.5)"/>
    <use href="#p2" transform="translate(350,350) rotate(337.5)"/>
  </g>

  <!-- ── Ring 3 — 8 smaller petals, aligned with ring 1 ───────────────── -->
  <g fill="url(#fg)" filter="url(#s3)">
    <use href="#p3" transform="translate(350,350) rotate(0)"/>
    <use href="#p3" transform="translate(350,350) rotate(45)"/>
    <use href="#p3" transform="translate(350,350) rotate(90)"/>
    <use href="#p3" transform="translate(350,350) rotate(135)"/>
    <use href="#p3" transform="translate(350,350) rotate(180)"/>
    <use href="#p3" transform="translate(350,350) rotate(225)"/>
    <use href="#p3" transform="translate(350,350) rotate(270)"/>
    <use href="#p3" transform="translate(350,350) rotate(315)"/>
  </g>

  <!-- ── Ring 4 — 8 petals, offset 22.5° ─────────────────────────────── -->
  <g fill="url(#fg)" filter="url(#s4)">
    <use href="#p4" transform="translate(350,350) rotate(22.5)"/>
    <use href="#p4" transform="translate(350,350) rotate(67.5)"/>
    <use href="#p4" transform="translate(350,350) rotate(112.5)"/>
    <use href="#p4" transform="translate(350,350) rotate(157.5)"/>
    <use href="#p4" transform="translate(350,350) rotate(202.5)"/>
    <use href="#p4" transform="translate(350,350) rotate(247.5)"/>
    <use href="#p4" transform="translate(350,350) rotate(292.5)"/>
    <use href="#p4" transform="translate(350,350) rotate(337.5)"/>
  </g>

  <!-- ── Ring 5 — 5 innermost petals, 72° apart ───────────────────────── -->
  <g fill="url(#fg)" filter="url(#s5)">
    <use href="#p5" transform="translate(350,350) rotate(0)"/>
    <use href="#p5" transform="translate(350,350) rotate(72)"/>
    <use href="#p5" transform="translate(350,350) rotate(144)"/>
    <use href="#p5" transform="translate(350,350) rotate(216)"/>
    <use href="#p5" transform="translate(350,350) rotate(288)"/>
  </g>

  <!-- Centre bud -->
  <circle cx="350" cy="350" r="14" fill="#071B08"/>
  <circle cx="347" cy="346" r="5"  fill="#66BB6A" opacity="0.28"/>
</svg>
